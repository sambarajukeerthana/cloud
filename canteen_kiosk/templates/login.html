<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body {
            background: url("/static/images/index_bg.jpg") no-repeat center center fixed;
            background-size: cover;
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
            padding-top: 100px;
        }
        .form-container {
            background-color: rgba(0, 0, 0, 0.7);
            display: inline-block;
            padding: 40px;
            border-radius: 10px;
        }
        input {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 10px auto;
            border-radius: 5px;
        }
        button {
            padding: 10px 20px;
            background-color: #007bff;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
        }
        .error {
            color: red;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h1>Login</h1>
        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}
        <form method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
